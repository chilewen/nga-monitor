name: NGA监控-5分钟自触发
on:
  workflow_dispatch:  # 手动触发
  repository_dispatch:  # API 触发

jobs:
  run-nga-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write  # 新增：允许触发其他 workflow
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      
      - name: 切换到main分支
        run: git checkout main && git pull origin main --allow-unrelated-histories
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 运行监控脚本
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          NGA_COOKIE: ${{ secrets.NGA_COOKIE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_ACTIONS: "true"
        run: python nga_monitor.py  # 你的脚本名

      # 新增：等待5分钟后，触发自己（实现无限循环）
      - name: 等待5分钟
        run: sleep 300  # 300秒 = 5分钟

      - name: 触发下一次运行
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: trigger-nga
          repository: ${{ github.repository }}
