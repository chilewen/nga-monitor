name: NGA帖子监控推送

on:
  # 定时执行（每10分钟一次，可自行调整）
  schedule:
    - cron: '*/10 * * * *'
  # 手动触发（方便测试）
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行监控脚本
        env:
          # 敏感信息：从Secrets读取
          BARK_KEY: ${{ secrets.BARK_KEY }}
          NGA_COOKIE: ${{ secrets.NGA_COOKIE }}
          # 非敏感配置：从Variables读取（核心改动）
          NGA_POST_URL: ${{ vars.NGA_POST_URL }}
          TARGET_USER: ${{ vars.TARGET_USER }}
        run: |
          python nga_monitor.py

      - name: 保存已推送记录（避免重复推送）
        uses: actions/upload-artifact@v4
        with:
          name: pushed-replies
          path: pushed_replies.txt
          retention-days: 90  # 记录保留90天
