name: NGA监控-5分钟自动循环
on:
  workflow_dispatch:  # 手动触发
  repository_dispatch:
    types: [trigger_nga]  # API触发标识

jobs:
  run-nga-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 提交元数据文件
      actions: write           # 触发下一次运行
      repository-projects: write  # 补充权限
    steps:
      # 1. 拉取代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      # 2. 配置Git
      - name: 配置Git环境
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout main
          git pull origin main --allow-unrelated-histories

      # 3. 设置Python环境（修复缓存报错）
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # 去掉cache配置

      # 4. 安装所需依赖
      - name: 安装所需依赖
        run: pip install requests

      # 5. 运行NGA监控脚本
      - name: 执行监控脚本
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          NGA_COOKIE: ${{ secrets.NGA_COOKIE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS: "true"
        run: python nga_monitor.py

      # 6. 等待5分钟（300秒）
      # - name: 等待5分钟
      #   run: sleep 300
      #   if: always()  # 即使脚本失败也继续

